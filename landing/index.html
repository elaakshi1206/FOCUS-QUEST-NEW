<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Quest — Turn focus into wins 🎯</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      width: 100%; height: 100%; overflow: hidden; /* Prevent scroll on screens */
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #d1fae5 100%);
      color: #1e293b;
    }

    /* ─── Container ────────────────────────────────────────── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      opacity: 1; transition: opacity 0.5s;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }
    .screen.gone { display: none; }

    /* ─── Background Decorations ───────────────────────────── */
    .cloud {
      position: absolute; border-radius: 50%;
      pointer-events: none;
    }
    .cloud-1 {
      top: 15%; left: 15%; width: 100px; height: 100px;
      background: rgba(255,255,255,0.45); filter: blur(12px);
      animation: float-cloud 6s ease-in-out infinite;
    }
    .cloud-2 {
      bottom: 25%; right: 10%; width: 140px; height: 140px;
      background: rgba(255,255,255,0.3); filter: blur(16px);
      animation: float-cloud 8s ease-in-out infinite alternate;
    }
    .cloud-3 {
      top: 35%; right: 8%; width: 70px; height: 70px;
      background: rgba(255,255,255,0.5); filter: blur(8px);
      animation: float-cloud 5s ease-in-out infinite;
    }

    @keyframes float-cloud {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    /* ─── Logo ───────────────────────────────────────────── */
    .mascot-wrap {
      width: 100%; max-width: 400px;
      margin-bottom: 24px;
      animation: pop-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .mascot-img {
      width: 100%; height: auto; object-fit: contain;
    }

    @keyframes pop-in {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* ─── Typography ───────────────────────────────────────── */
    
    .subtitle {
      font-size: clamp(1.1rem, 3.5vw, 1.45rem);
      font-weight: 500;
      color: #475569;
      margin-bottom: 48px;
      text-align: center;
      max-width: 400px;
      animation: fade-up 0.8s 0.3s both cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes fade-up {
      from { transform: translateY(25px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* ─── Buttons ──────────────────────────────────────────── */
    .btn-wrap {
      display: flex; flex-direction: column; gap: 16px;
      width: 100%; max-width: 360px;
      position: relative; z-index: 10;
      animation: fade-up 0.8s 0.4s both cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn {
      font-family: inherit;
      border-radius: 24px;
      padding: 20px 32px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      display: block;
      transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
    }
    
    .btn:active {
      transform: translateY(4px) scale(0.98);
    }

    .btn-signup {
      background: linear-gradient(135deg, #34d399, #10b981);
      color: white;
      border: none;
      box-shadow: 0 8px 15px rgba(52, 211, 153, 0.3), inset 0 -5px 0 rgba(0,0,0,0.15);
    }
    .btn-signup:hover {
      transform: scale(1.02);
    }
    .btn-signup:active {
      box-shadow: 0 2px 10px rgba(52, 211, 153, 0.4), inset 0 -1px 0 rgba(0,0,0,0.1);
    }

    /* ─── SCREEN 2 — VIDEO ──────────────────────────────────── */
    #video-screen { 
      z-index: 50; flex-direction: column; gap: 10px; padding: 24px; background: #0a0010; color: white;
    }

    #promo-video {
      position: relative; z-index: 3;
      width: 92vw; max-width: 1200px;
      aspect-ratio: 16/9;
      border-radius: 24px;
      border: 1.5px solid rgba(200,0,255,0.35);
      box-shadow:
        0 0 60px rgba(200,0,255,0.5),
        0 0 120px rgba(255,45,155,0.25),
        0 30px 80px rgba(0,0,0,0.6);
      cursor: pointer;
      object-fit: cover;
      background: #000;
    }

    .skip-hint {
      margin-top: 10px;
      font-size: 0.9rem; font-weight: 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.1em;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:0.45; } 50% { opacity:0.9; }
    }

    /* progress bar for video */
    .video-progress-wrap {
      width: 92vw; max-width: 1200px;
      height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      position: relative; z-index: 3;
    }
    .video-progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ff2d9b, #c800ff);
      border-radius: 2px;
      transition: width 0.1s linear;
      box-shadow: 0 0 8px #c800ff;
    }
  </style>
</head>
<body>

  <!-- SCREEN 1 — INTRO -->
  <main id="intro" class="screen">
    <!-- Ambient Bubbles -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <!-- Mascot / Logo -->
    <div class="mascot-wrap">
      <img src="bg_logo-removebg-preview.png" alt="Focus Quest Logo" class="mascot-img" />
    </div>

    <!-- Text -->
    <p class="subtitle">Turn focus into wins 🎯</p>

    <!-- Buttons -->
    <div class="btn-wrap">
      <button id="btn-begin" class="btn btn-signup">Let's Begin</button>
    </div>
  </main>

  <!-- SCREEN 2 — VIDEO -->
  <section id="video-screen" class="screen hidden gone" aria-label="Intro video">
    <video
      id="promo-video"
      src="PixVerse_V6_Image_Text_720P_say_hi_hello_intro.mp4"
      playsinline
      title="FocusQuest intro"
    ></video>

    <div class="video-progress-wrap" aria-hidden="true">
      <div class="video-progress-bar" id="video-progress-bar"></div>
    </div>

    <p class="skip-hint" id="skip-hint">Click video to skip</p>
  </section>

  <script>
    (() => {
      'use strict';
  
      const introScreen  = document.getElementById('intro');
      const videoScreen  = document.getElementById('video-screen');
      const video        = document.getElementById('promo-video');
      const progressBar  = document.getElementById('video-progress-bar');
      const btnBegin     = document.getElementById('btn-begin');
  
      if (sessionStorage.getItem('fq_video_played') === '1') {
        sessionStorage.removeItem('fq_video_played');
        window.location.replace('http://localhost:5173/login');
        return;
      }

      /* ── helpers ── */
      function showScreen(el) {
        el.classList.remove('gone');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => el.classList.remove('hidden'));
        });
      }
  
      function hideScreen(el, cb) {
        el.classList.add('hidden');
        let fired = false;
        el.addEventListener('transitionend', function once() {
          if (fired) return;
          fired = true;
          el.removeEventListener('transitionend', once);
          el.classList.add('gone');
          if (cb) cb();
        });
      }
  
      /* ── STEP 1 → 2: "Let's Begin" ── */
      btnBegin.addEventListener('click', () => {
        if (btnBegin.disabled) return;
        btnBegin.disabled = true;
        hideScreen(introScreen, () => {
          showScreen(videoScreen);
  
          video.muted = false;
          const playPromise = video.play();
          if (playPromise !== undefined) {
            playPromise.catch(() => {
              video.muted = true;
              video.play().catch(() => {});
            });
          }
        });
      });
  
      /* ── Video progress ── */
      video.addEventListener('timeupdate', () => {
        if (video.duration) {
          progressBar.style.width = ((video.currentTime / video.duration) * 100) + '%';
        }
      });
  
      /* ── STEP 2 → LOGIN ── */
      let navigating = false;
      function goToLogin() {
        if (navigating) return;
        navigating = true;
        video.pause();
        sessionStorage.setItem('fq_video_played', '1');
        window.location.href = 'http://localhost:5173/login';
      }
  
      video.addEventListener('ended', goToLogin);
      video.addEventListener('click', goToLogin);
  
      // Accessibility
      btnBegin.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') e.currentTarget.click();
      });
    })();
  </script>

</body>
</html>
